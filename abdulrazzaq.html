<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1B2A4A" />
<title>BuildHop — عبدالرزاق محمد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#243760; --navy-2:#1B2A4A; --navy-l:#EAEEF6;
    --gold:#C9A227; --gold-2:#E8A320; --gold-l:#FBF3D9;
    --bg:#F4F6FB; --card:#FFFFFF; --ln:#E6E9F0; --ln2:#EFF1F6;
    --ink:#1F2937; --mut:#6B7280; --green:#0A8A4F; --green-l:#E4F6EC; --red:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;padding-bottom:74px}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh}

  header{background:linear-gradient(135deg,var(--navy),var(--navy-2));color:#fff;padding:16px 18px;position:sticky;top:0;z-index:30;box-shadow:0 4px 14px rgba(20,30,55,.15)}
  header .row{display:flex;align-items:center;gap:11px}
  header .logo{width:40px;height:40px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--navy-2);font-size:18px}
  header .ht{font-size:16px;font-weight:800}
  header .hs{font-size:11px;color:rgba(255,255,255,.6)}
  header .sync{margin-right:auto;font-size:10px;background:rgba(255,255,255,.12);padding:4px 9px;border-radius:20px}

  .content{padding:14px}
  .page{display:none}.page.active{display:block}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .stat{background:#fff;border:1px solid var(--ln);border-radius:13px;padding:12px 6px;text-align:center}
  .stat .n{font-size:22px;font-weight:900;color:var(--navy)}
  .stat .l{font-size:10px;color:var(--mut)}
  .stat.gold .n{color:var(--gold-2)}

  .sec-t{font-size:13px;font-weight:800;color:var(--navy);margin:6px 2px 10px;display:flex;align-items:center;gap:6px}
  .card{background:#fff;border:1px solid var(--ln);border-radius:14px;padding:14px;margin-bottom:10px}
  .vcard .vtop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .vcard .vc{font-weight:800;color:var(--navy);font-size:14px}
  .vcard .vmeta{font-size:11px;color:var(--mut);margin-top:3px}
  .vcard .vtag{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px}
  .t-new{background:var(--navy-l);color:var(--navy)} .t-exist{background:var(--green-l);color:var(--green)}
  .vcard .vdel{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;margin-top:6px;font-weight:700}

  label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin:10px 2px 5px}
  input,select,textarea{width:100%;padding:11px 12px;border:1.5px solid var(--ln);border-radius:11px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
  textarea{min-height:64px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seg{display:flex;gap:8px;margin-top:5px}
  .seg button{flex:1;padding:11px;border:1.5px solid var(--ln);background:#fff;border-radius:11px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;color:var(--mut)}
  .seg button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .geo{display:flex;align-items:center;gap:8px;margin-top:6px}
  .geo button{background:var(--gold-l);color:var(--navy);border:1px solid var(--gold);border-radius:11px;padding:10px 14px;font-weight:800;font-family:inherit;cursor:pointer;font-size:13px}
  .geo .gv{font-size:11px;color:var(--green);font-weight:700}

  .btn{width:100%;padding:14px;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .btn-gold{background:var(--gold);color:var(--navy-2)}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-green{background:var(--green);color:#fff}
  .btn:active{transform:scale(.99)}
  .btn[disabled]{opacity:.5}

  .pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .pill{border:1px solid var(--ln);background:#fff;border-radius:20px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);font-family:inherit}
  .pill.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .ctrl{padding:8px 10px;border:1px solid var(--ln);border-radius:10px;font-size:13px;font-family:inherit;width:auto}

  .daybar{display:flex;justify-content:space-between;align-items:center;background:var(--navy);color:#fff;padding:8px 13px;border-radius:11px;font-weight:800;font-size:12px;margin:14px 0 8px}
  .daybar .c{background:var(--gold);color:var(--navy-2);border-radius:20px;padding:1px 9px;font-size:11px}
  .afields{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
  .af .k{color:var(--mut);font-size:10px} .af .v{font-weight:700;font-size:12.5px}
  .src{font-size:9px;font-weight:800;padding:1px 7px;border-radius:10px;margin-right:5px}
  .s-cloud{background:var(--green-l);color:var(--green)} .s-local{background:var(--gold-l);color:var(--gold-2)}

  .empty{text-align:center;padding:40px 18px;color:var(--mut)}
  .empty .ei{font-size:36px;margin-bottom:8px}.empty b{display:block;color:var(--navy);font-size:15px}
  .spin{width:28px;height:28px;border:3px solid var(--ln);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite;margin:26px auto}
  @keyframes sp{to{transform:rotate(360deg)}}

  .tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--ln);display:flex;z-index:40;max-width:560px;margin:0 auto}
  .tab{flex:1;border:none;background:none;padding:8px 2px 7px;font-size:10px;font-weight:700;color:var(--mut);cursor:pointer;font-family:inherit}
  .tab .ti{display:block;font-size:19px;margin-bottom:1px}
  .tab.on{color:var(--navy)}
  .tab.add .ti{background:var(--gold);color:var(--navy-2);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:-14px auto 2px;box-shadow:0 4px 10px rgba(201,162,39,.4)}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--navy-2);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:700;display:none;z-index:60;max-width:90%;text-align:center}
  .modal{position:fixed;inset:0;background:rgba(20,30,55,.55);display:none;align-items:flex-end;justify-content:center;z-index:70}
  .modal.on{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:22px;text-align:center}
  .sheet .ico{font-size:46px;margin-bottom:8px}
  .sheet h3{font-size:18px;color:var(--navy);margin-bottom:6px}
  .sheet p{font-size:13px;color:var(--mut);margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="row">
      <div class="logo">B</div>
      <div><div class="ht">BuildHop CRM</div><div class="hs">المندوب: عبدالرزاق محمد</div></div>
      <div class="sync" id="sync">…</div>
    </div>
  </header>

  <div class="content">

    <!-- VISITS TODAY -->
    <div class="page active" id="p-visits">
      <div class="stats">
        <div class="stat"><div class="n" id="st-v">0</div><div class="l">زيارات اليوم</div></div>
        <div class="stat"><div class="n" id="st-r">0</div><div class="l">طلبات اليوم</div></div>
        <div class="stat gold"><div class="n" id="st-p">0</div><div class="l">نقاط اليوم</div></div>
      </div>
      <div class="sec-t">📍 زيارات اليوم</div>
      <div id="visits-today"></div>
    </div>

    <!-- NEW VISIT -->
    <div class="page" id="p-new">
      <div class="sec-t">➕ تسجيل زيارة جديدة</div>
      <div class="card">
        <label>اسم العميل *</label>
        <input id="f-client" placeholder="مثال: شركة كذا للمقاولات" />

        <label>نوع العميل</label>
        <div class="seg">
          <button type="button" id="seg-new" class="on" onclick="setType('New')">جديد</button>
          <button type="button" id="seg-exist" onclick="setType('Existing')">حالي</button>
        </div>

        <div class="grid2">
          <div><label>المنطقة</label><input id="f-region" value="الرياض" /></div>
          <div><label>الحي</label><input id="f-hood" placeholder="مثال: شرق الرياض" /></div>
        </div>

        <label>تصنيف العميل</label>
        <select id="f-size">
          <option value="">— اختر —</option>
          <option value="prospect">محتمل (prospect)</option>
          <option value="active">نشط (active)</option>
          <option value="dormant">خامل (dormant)</option>
          <option value="strategic">استراتيجي (strategic)</option>
          <option value="A">A</option><option value="B">B</option><option value="C">C</option>
        </select>

        <label>هدف الزيارة</label>
        <input id="f-purpose" placeholder="مثال: متابعة / تعريف / تحصيل" />
        <label>نتيجة الزيارة</label>
        <input id="f-result" placeholder="مثال: عرض سعر / تنشيط / علاقة" />

        <div class="grid2">
          <div><label>جهة الاتصال</label><input id="f-contact" placeholder="الاسم" /></div>
          <div><label>الهاتف</label><input id="f-phone" inputmode="numeric" placeholder="05xxxxxxxx" /></div>
        </div>
        <label>الوظيفة</label>
        <input id="f-role" placeholder="مثال: مهندس / مشتريات" />

        <div class="grid2">
          <div><label>نوع المشروع</label><input id="f-ptype" placeholder="مثال: فيلا / عمائر" /></div>
          <div><label>مرحلة المشروع</label><input id="f-pstage" placeholder="مثال: عظم / تشطيب" /></div>
        </div>

        <label>الخطوة القادمة</label>
        <input id="f-next" placeholder="مثال: زيارة ميدانية / اتصال" />
        <label>تاريخ المتابعة</label>
        <input id="f-nextdate" type="date" />

        <div class="grid2">
          <div><label>حالة العرض</label><input id="f-qstatus" placeholder="مثال: pending" /></div>
          <div><label>المدة (دقائق)</label><input id="f-duration" inputmode="numeric" placeholder="30" /></div>
        </div>

        <label>الموقع</label>
        <div class="geo">
          <button type="button" onclick="getLoc()">📍 تحديد موقعي</button>
          <span class="gv" id="f-geo"></span>
        </div>

        <label>ملاحظات</label>
        <textarea id="f-notes" placeholder="أي تفاصيل إضافية"></textarea>

        <div style="margin-top:14px"><button class="btn btn-gold" onclick="saveVisit()">حفظ الزيارة</button></div>
      </div>
    </div>

    <!-- REQUESTS -->
    <div class="page" id="p-req">
      <div class="sec-t">📦 طلب منتجات</div>
      <div class="card">
        <label>اسم العميل *</label>
        <input id="r-client" placeholder="اسم العميل" />
        <label>المنتجات المطلوبة *</label>
        <input id="r-products" placeholder="مثال: بلاط، دهانات، عوازل" />
        <label>ملاحظات</label>
        <textarea id="r-notes" placeholder="كمية / تفاصيل"></textarea>
        <div style="margin-top:14px"><button class="btn btn-navy" onclick="saveReq()">حفظ الطلب</button></div>
      </div>
      <div class="sec-t">طلبات اليوم</div>
      <div id="req-today"></div>
    </div>

    <!-- ARCHIVE -->
    <div class="page" id="p-archive">
      <div class="sec-t">🗂️ سجل الزيارات</div>
      <div class="pills">
        <input type="date" id="arch-date" class="ctrl" onchange="renderArchive()" />
        <input type="search" id="arch-q" class="ctrl" style="flex:1;min-width:120px" placeholder="بحث باسم العميل" oninput="renderArchive()" />
        <button class="pill" onclick="document.getElementById('arch-date').value='';document.getElementById('arch-q').value='';renderArchive()">الكل</button>
      </div>
      <div id="archive-content"><div class="spin"></div></div>
    </div>

  </div>
</div>

<div class="tabbar">
  <button class="tab on" id="tab-visits" onclick="go('visits')"><span class="ti">📋</span>اليوم</button>
  <button class="tab" id="tab-req" onclick="go('req')"><span class="ti">📦</span>الطلبات</button>
  <button class="tab add" id="tab-new" onclick="go('new')"><span class="ti">＋</span>زيارة</button>
  <button class="tab" id="tab-archive" onclick="go('archive')"><span class="ti">🗂️</span>السجل</button>
  <button class="tab" id="tab-send" onclick="doSubmit()"><span class="ti">☁️</span>إرسال</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="okModal">
  <div class="sheet">
    <div class="ico">✅</div>
    <h3>تم الإرسال بنجاح</h3>
    <p id="okMsg">حُفظت زياراتك في النظام السحابي.</p>
    <button class="btn btn-green" onclick="closeOk()">تمام</button>
  </div>
</div>

<script>
// ===== CONFIG =====
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyTBRrJRoukyyt-4c9f9H3_6DfoPVidMvB4sH7gkpFSY4wcgZuGCLSaePCFqJl5-GzBGw/exec';
var REP_NAME='عبدالرزاق محمد';
var PREFIX='bh_abdulrazzaq_';
var PAGES=['visits','req','new','archive'];

// ===== STATE =====
var visits=load('visits',[]);      // today's working visits (local)
var requests=load('requests',[]);  // today's working requests (local)
var cloudVisits=[];                 // history from sheet
var newType='New', geo={lat:'',lng:''};

// ===== UTILS =====
function load(k,d){try{var v=JSON.parse(localStorage.getItem(PREFIX+k)||'null');return v==null?d:v;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(PREFIX+k,JSON.stringify(v));}catch(e){}}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function txt(v){return v==null?'':String(v);}
function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function today(){return new Date(Date.now()+180*60000).toISOString().slice(0,10);}
function nowTime(){return new Date(Date.now()+180*60000).toISOString().slice(11,16);}
function dstr(v){var s=txt(v);if(!s)return '';if(s.indexOf('T')>-1){var d=new Date(s);if(!isNaN(d.getTime()))return new Date(d.getTime()+180*60000).toISOString().slice(0,10);}return s.slice(0,10);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none';},2200);}
function prettyDate(d){if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return d;var dt=new Date(d+'T00:00:00');var days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];return days[dt.getDay()]+' · '+dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

// نظام النقاط الجديد (نظيف وشفّاف): جديد=10، حالي=5، محتمل +3، خطوة قادمة +2
function visitPoints(v){var p=(txt(v.type)==='New')?10:5;if(txt(v.clientSize)==='prospect')p+=3;if(txt(v.nextAction))p+=2;return p;}
function todayScore(){return visits.filter(function(v){return v.date===today();}).reduce(function(s,v){return s+visitPoints(v);},0);}

// ===== NAV =====
function go(id){
  PAGES.forEach(function(p){var e=document.getElementById('p-'+p);if(e)e.classList.remove('active');});
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  var map={visits:'tab-visits',req:'tab-req',new:'tab-new',archive:'tab-archive'};
  var tb=document.getElementById(map[id]);if(tb)tb.classList.add('on');
  if(id==='archive')renderArchive();
  window.scrollTo(0,0);
}

// ===== NEW VISIT =====
function setType(t){newType=t;document.getElementById('seg-new').classList.toggle('on',t==='New');document.getElementById('seg-exist').classList.toggle('on',t==='Existing');}
function getLoc(){
  if(!navigator.geolocation){toast('الموقع غير مدعوم');return;}
  document.getElementById('f-geo').textContent='جارٍ التحديد…';
  navigator.geolocation.getCurrentPosition(function(p){
    geo.lat=p.coords.latitude.toFixed(6);geo.lng=p.coords.longitude.toFixed(6);
    document.getElementById('f-geo').textContent='✓ تم تحديد الموقع';
  },function(){document.getElementById('f-geo').textContent='تعذّر تحديد الموقع';});
}
function saveVisit(){
  var client=val('f-client');
  if(!client){toast('اكتب اسم العميل');return;}
  var v={
    id:Date.now(), date:today(), time:nowTime(), client:client, type:newType,
    region:val('f-region'), hood:val('f-hood'), clientSize:val('f-size'),
    purpose:val('f-purpose'), visitResult:val('f-result'),
    contact:val('f-contact'), phone:val('f-phone'), contactRole:val('f-role'),
    projectType:val('f-ptype'), projectStage:val('f-pstage'),
    nextAction:val('f-next'), nextDate:val('f-nextdate'),
    quoteStatus:val('f-qstatus'), duration:val('f-duration'),
    lat:geo.lat, lng:geo.lng, notes:val('f-notes'),
    relation:'', sectors:'', quoteNumber:'', opportunities:'', openIssues:'',
    paymentAmount:'', paymentMethod:'', sampleProduct:'', hasPhoto:false
  };
  visits.push(v);save('visits',visits);
  ['f-client','f-hood','f-purpose','f-result','f-contact','f-phone','f-role','f-ptype','f-pstage','f-next','f-nextdate','f-qstatus','f-duration','f-notes'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('f-size').value='';geo={lat:'',lng:''};document.getElementById('f-geo').textContent='';setType('New');
  toast('✓ حُفظت الزيارة');renderVisits();go('visits');
}
function delVisit(id){visits=visits.filter(function(v){return v.id!==id;});save('visits',visits);renderVisits();}

// ===== REQUESTS =====
function saveReq(){
  var c=val('r-client'),p=val('r-products');
  if(!c||!p){toast('اكتب العميل والمنتجات');return;}
  requests.push({id:Date.now(),date:today(),time:nowTime(),client:c,products:p,notes:val('r-notes')});
  save('requests',requests);
  document.getElementById('r-client').value='';document.getElementById('r-products').value='';document.getElementById('r-notes').value='';
  toast('✓ حُفظ الطلب');renderReq();
}
function delReq(id){requests=requests.filter(function(r){return r.id!==id;});save('requests',requests);renderReq();}

// ===== RENDER TODAY =====
function renderVisits(){
  var tv=visits.filter(function(v){return v.date===today();});
  document.getElementById('st-v').textContent=tv.length;
  document.getElementById('st-r').textContent=requests.filter(function(r){return r.date===today();}).length;
  document.getElementById('st-p').textContent=todayScore();
  var el=document.getElementById('visits-today');
  if(!tv.length){el.innerHTML='<div class="empty"><div class="ei">📍</div><b>لا زيارات بعد</b>اضغط ＋ لتسجيل زيارة</div>';return;}
  el.innerHTML=tv.slice().reverse().map(function(v){
    var tag=v.type==='New'?'<span class="vtag t-new">جديد</span>':'<span class="vtag t-exist">حالي</span>';
    return '<div class="card vcard"><div class="vtop"><div><div class="vc">'+esc(v.client)+'</div><div class="vmeta">⏱ '+esc(v.time)+(v.hood?' · '+esc(v.hood):'')+(v.clientSize?' · '+esc(v.clientSize):'')+'</div></div>'+tag+'</div>'+(v.purpose||v.nextAction?'<div class="vmeta" style="margin-top:6px">'+esc(v.purpose||'')+(v.nextAction?' → '+esc(v.nextAction):'')+'</div>':'')+'<button class="vdel" onclick="delVisit('+v.id+')">حذف</button></div>';
  }).join('');
}
function renderReq(){
  var tr=requests.filter(function(r){return r.date===today();});
  document.getElementById('st-r').textContent=tr.length;
  var el=document.getElementById('req-today');
  if(!tr.length){el.innerHTML='<div class="empty" style="padding:20px"><b>لا طلبات بعد</b></div>';return;}
  el.innerHTML=tr.slice().reverse().map(function(r){
    return '<div class="card vcard"><div class="vc">'+esc(r.client)+'</div><div class="vmeta" style="margin-top:4px">'+esc(r.products)+'</div>'+(r.notes?'<div class="vmeta">'+esc(r.notes)+'</div>':'')+'<button class="vdel" onclick="delReq('+r.id+')">حذف</button></div>';
  }).join('');
}

// ===== ARCHIVE (cloud + local) =====
function cloudToVisit(c){
  var coords=String(c['الإحداثيات']||'').split(','),lat=coords[0]&&coords[1]?coords[0].trim():'',lng=coords[1]?coords[1].trim():'';
  return {_src:'cloud',date:dstr(c['التاريخ']),time:txt(c['الوقت']),client:txt(c['العميل']),type:txt(c['النوع']),
    hood:txt(c['الحي']),region:txt(c['المنطقة']),purpose:txt(c['هدف الزيارة']),visitResult:txt(c['نتيجة الزيارة']),
    clientSize:txt(c['تصنيف العميل']),contact:txt(c['جهة الاتصال']),phone:txt(c['الهاتف']),contactRole:txt(c['الوظيفة']),
    projectType:txt(c['نوع المشروع']),projectStage:txt(c['مرحلة المشروع']),nextAction:txt(c['الخطوة القادمة']),
    nextDate:dstr(c['تاريخ المتابعة']),quoteStatus:txt(c['حالة العرض']),duration:txt(c['المدة (د)']),
    notes:txt(c['ملاحظات']),lat:lat,lng:lng};
}
function archiveData(){
  var map={};
  cloudVisits.forEach(function(c){var v=cloudToVisit(c);map[v.date+'|'+v.time+'|'+v.client]=v;});
  visits.forEach(function(v){var k=v.date+'|'+v.time+'|'+v.client;if(!map[k]){var x={};for(var p in v)x[p]=v[p];x._src='local';map[k]=x;}});
  return Object.keys(map).map(function(k){return map[k];});
}
function archCard(v){
  var F=[['النوع','type'],['المنطقة','region'],['الحي','hood'],['الغرض','purpose'],['النتيجة','visitResult'],['التصنيف','clientSize'],['جهة الاتصال','contact'],['الهاتف','phone'],['المشروع','projectType'],['المرحلة','projectStage'],['الخطوة القادمة','nextAction'],['المتابعة','nextDate'],['العرض','quoteStatus'],['المدة','duration']];
  var rows=F.map(function(f){var val=txt(v[f[1]]);if(!val)return '';return '<div class="af"><div class="k">'+f[0]+'</div><div class="v">'+esc(val)+'</div></div>';}).join('');
  var mp=(v.lat&&v.lng)?'<a href="https://maps.google.com/?q='+v.lat+','+v.lng+'" target="_blank" style="color:var(--gold-2);font-weight:800;font-size:12px;text-decoration:none;display:inline-block;margin-top:7px">📍 الموقع</a>':'';
  var src=v._src==='cloud'?'<span class="src s-cloud">☁ سحابة</span>':'<span class="src s-local">📱 جهاز</span>';
  return '<div class="card"><div class="vc">'+esc(v.client||'—')+' '+src+'</div><div class="vmeta">⏱ '+esc(v.time)+'</div><div class="afields">'+rows+'</div>'+(v.notes?'<div class="vmeta" style="margin-top:7px;background:var(--bg);padding:7px 9px;border-radius:8px">'+esc(v.notes)+'</div>':'')+mp+'</div>';
}
function renderArchive(){
  var el=document.getElementById('archive-content');
  var df=val('arch-date'),q=val('arch-q').toLowerCase();
  var list=archiveData().filter(function(v){
    if(df&&v.date!==df)return false;
    if(q&&txt(v.client).toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">🗂️</div><b>لا توجد زيارات</b></div>';return;}
  var by={};list.forEach(function(v){var d=v.date||'—';(by[d]=by[d]||[]).push(v);});
  var dates=Object.keys(by).sort(function(a,b){return a<b?1:-1;});
  el.innerHTML=dates.map(function(d){
    var items=by[d].sort(function(a,b){return txt(b.time).localeCompare(txt(a.time));});
    return '<div class="daybar"><span>'+prettyDate(d)+'</span><span class="c">'+items.length+'</span></div>'+items.map(archCard).join('');
  }).join('');
}

// ===== CLOUD LOAD (JSONP) =====
function loadCloud(){
  document.getElementById('sync').textContent='…مزامنة';
  var cb='__bh'+Date.now();
  var done=false;
  var t=setTimeout(function(){if(!done){done=true;document.getElementById('sync').textContent='⚠ بدون اتصال';}},12000);
  window[cb]=function(resp){
    if(done)return;done=true;clearTimeout(t);delete window[cb];
    if(resp&&resp.status==='success'){cloudVisits=resp.visits||[];document.getElementById('sync').textContent='☁ متصل';renderArchive();}
    else document.getElementById('sync').textContent='⚠ خطأ';
  };
  var s=document.createElement('script');
  s.src=SCRIPT_URL+'?mode=archive&rep='+encodeURIComponent(REP_NAME)+'&callback='+cb+'&t='+Date.now();
  s.onerror=function(){if(!done){done=true;document.getElementById('sync').textContent='⚠ بدون اتصال';}};
  document.head.appendChild(s);
}

// ===== SUBMIT (POST) =====
function doSubmit(){
  var tv=visits.filter(function(v){return v.date===today();});
  var tr=requests.filter(function(r){return r.date===today();});
  if(!tv.length&&!tr.length){toast('لا يوجد ما تُرسله اليوم');return;}
  var payload={
    type:'report', repName:REP_NAME, date:today(),
    todayVisits:tv.length,
    existingVisits:tv.filter(function(v){return v.type==='Existing';}).length,
    newVisits:tv.filter(function(v){return v.type==='New';}).length,
    prospectVisits:tv.filter(function(v){return v.clientSize==='prospect';}).length,
    score:todayScore(),
    newClientsThisMonth:monthCount('New'),
    opportunitiesThisMonth:monthOpps(),
    quotesThisMonth:monthQuotes(),
    productRequestsToday:tr.length,
    visits:tv, requests:tr.map(function(r){return {time:r.time,client:r.client,products:r.products,notes:r.notes};})
  };
  document.getElementById('sync').textContent='…إرسال';
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)})
    .then(function(){onSent();}).catch(function(){onSent();/* no-cors لا يُرجِع خطأ عادةً */});
}
function onSent(){
  document.getElementById('sync').textContent='☁ تم الإرسال';
  document.getElementById('okModal').classList.add('on');
  setTimeout(loadCloud,1500); // أعد تحميل السحابة لتأكيد الحفظ
}
function closeOk(){document.getElementById('okModal').classList.remove('on');go('archive');}
function monthCount(type){var m=today().slice(0,7);return visits.filter(function(v){return v.type===type&&String(v.date).slice(0,7)===m;}).length;}
function monthOpps(){var m=today().slice(0,7);return visits.filter(function(v){return String(v.date).slice(0,7)===m&&txt(v.visitResult).indexOf('فرص')>-1;}).length;}
function monthQuotes(){var m=today().slice(0,7);return visits.filter(function(v){return String(v.date).slice(0,7)===m&&txt(v.quoteStatus);}).length;}

// ===== INIT =====
renderVisits();renderReq();loadCloud();
</script>
